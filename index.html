<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xipermine</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

header {
  text-align: center;
  padding: 80px 20px;
}

h1 {
  font-size: 60px;
  color: #facc15;
  margin: 0;
}

.subtitle {
  color: #cbd5f5;
  margin-top: 10px;
}

.server-box {
  margin: 40px auto;
  max-width: 600px;
  background: #020617;
  border: 2px solid #facc15;
  border-radius: 20px;
  padding: 30px;
}

.ip {
  font-size: 22px;
  margin: 10px 0;
}

button {
  background: transparent;
  border: 2px solid #facc15;
  color: #facc15;
  padding: 10px 20px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #facc15;
  color: black;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
  flex-wrap: wrap;
}

.card {
  background: #facc15;
  color: black;
  padding: 20px 30px;
  border-radius: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.section {
  max-width: 900px;
  margin: 80px auto;
  padding: 20px;
}

.section h2 {
  color: #facc15;
}

.command {
  background: #020617;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

</style>
</head>
<body>

<header>
  <h1>XIPERMINE</h1>
  <p class="subtitle">El mejor Survival Custom</p>

  <div class="server-box">
    <h3>Conéctate al servidor</h3>

    <p>Java Edition</p>
    <div class="ip">play.xipermine.net</div>
    <button onclick="copyIP('play.xipermine.net')">Copiar IP</button>
  </div>

  <div class="cards">
    <div class="card">Discord</div>
    <div class="card">Tienda</div>
    <div class="card">Wiki</div>
  </div>
</header>

<div class="section">
  <h2>🚀 Teletransportes</h2>
  <div class="command">/spawn</div>
  <div class="command">/home</div>
  <div class="command">/tpa jugador</div>
</div>

<div class="section">
  <h2>💱 Tradeos</h2>
  <div class="command">/trade jugador</div>
</div>

<div class="section">
  <h2>🏪 Player Warps</h2>
  <div class="command">/pwarp create</div>
</div>

<div class="section">
  <h2>💰 Economía</h2>
  <div class="command">/pay jugador cantidad</div>
</div>

<div id="toast" style="position:fixed;bottom:20px;right:20px;background:#020617;border:1px solid #facc15;color:white;padding:15px 20px;border-radius:10px;opacity:0;transition:0.3s;pointer-events:none;">
  IP copiada!
</div>

<div id="toast" style="position:fixed;bottom:20px;right:20px;background:#020617;border:1px solid #facc15;color:white;padding:15px 20px;border-radius:10px;opacity:0;transition:0.3s;pointer-events:none;">
  IP copiada!
</div>

<script>
function copyIP(ip) {
  navigator.clipboard.writeText(ip);

  const toast = document.getElementById("toast");
  toast.innerText = "IP copiada: " + ip;
  toast.style.opacity = "1";

  setTimeout(() => {
    toast.style.opacity = "0";
  }, 2500);
}
</script>

</body>
</html>
